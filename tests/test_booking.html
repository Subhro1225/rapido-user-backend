<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 4 — Booking Endpoint Tests</title>
    <style>
        body { font-family: monospace; max-width: 720px; margin: 40px auto; padding: 0 16px; background: #0f0f0f; color: #e0e0e0; }
        h1 { color: #fff; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .case { margin: 16px 0; border: 1px solid #2a2a2a; border-radius: 4px; overflow: hidden; }
        .case-header { padding: 8px 12px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .case-title { font-weight: bold; }
        .badge { padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; }
        .pending  { background: #333; color: #aaa; }
        .pass     { background: #1a3a1a; color: #4caf50; }
        .fail     { background: #3a1a1a; color: #f44336; }
        .response { padding: 10px 12px; font-size: 0.8rem; white-space: pre-wrap; word-break: break-all; color: #9e9e9e; }
        button { margin: 0 6px 0 0; padding: 6px 14px; background: #222; color: #ddd; border: 1px solid #444; border-radius: 3px; cursor: pointer; font-family: monospace; }
        button:hover { background: #333; }
        #run-all { margin-bottom: 20px; }
        #summary { margin-top: 20px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <h1>Phase 4 — Booking Endpoint Test Suite</h1>
    <p style="color:#666;font-size:0.8rem;">
        Ensure a PHP session with <code>user_id</code> is active before running.<br>
        Endpoint: <code>POST ../user/book_ride.php</code>
    </p>
    <button id="run-all">▶ Run All Tests</button>
    <div id="cases"></div>
    <div id="summary"></div>
    <script src="test_booking.js"></script>
</body>
</html>
